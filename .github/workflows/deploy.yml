name: Secure Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Institutional Secrets
        run: |
          sed -i "s|___SUPABASE_URL___|${{ secrets.SUPABASE_URL }}|g" index.html
          sed -i "s|___SUPABASE_KEY___|${{ secrets.SUPABASE_KEY }}|g" index.html
          sed -i "s|___TERMINAL_PWD___|${{ secrets.TERMINAL_PWD }}|g" index.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        
