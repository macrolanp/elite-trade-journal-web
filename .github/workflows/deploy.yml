name: Institutional Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Institutional Secrets
        run: |
          # The indentation here is critical: exactly 6 spaces from the left
          sed -i "s|___SUB_URL___|${{ secrets.SUPABASE_URL }}|g" index.html
          sed -i "s|___SUB_KEY___|${{ secrets.SUPABASE_KEY }}|g" index.html
          sed -i "s|___SUB_PWD___|${{ secrets.TERMINAL_PWD }}|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        
