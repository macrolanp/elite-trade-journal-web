<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Journal | Dynamic Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #131722; color: #d1d4dc; margin: 0; padding: 15px; font-family: sans-serif; }
        .card { background: #1e222d; border: 1px solid #363a45; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        #chart-container { width: 100%; height: 420px; border-radius: 12px; overflow: hidden; border: 1px solid #363a45; }
    </style>
</head>
<body>
    <header class="flex justify-between items-center mb-6 px-1">
        <h1 class="text-xl font-bold text-white uppercase tracking-tighter">Elite Journal</h1>
        <div class="flex items-center gap-2">
            <span class="text-[10px] text-green-400 font-bold uppercase" id="pair-display">XAUUSD Monitoring</span>
        </div>
    </header>

    <div class="card border-l-4 border-l-blue-600 shadow-2xl">
        <div class="flex justify-between items-center mb-4">
            <span id="active-pair" class="text-lg font-bold text-white underline decoration-blue-500">XAU/USD</span>
            <span class="bg-blue-900/40 text-blue-400 text-[10px] px-2 py-1 rounded font-bold">AI SIGNAL ACTIVE</span>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-5">
            <div class="bg-[#2a2e39] p-3 rounded-lg text-center">
                <p class="text-[9px] text-gray-400 uppercase font-bold mb-1">Entry</p>
                <p id="entry-price" class="text-md font-mono text-white font-bold">---</p>
            </div>
            <div class="bg-[#2a2e39] p-3 rounded-lg text-center">
                <p class="text-[9px] text-gray-400 uppercase font-bold mb-1">Target</p>
                <p id="target-price" class="text-md font-mono text-green-400 font-bold">---</p>
            </div>
        </div>

        <button id="mt5-btn" class="w-full bg-[#2962ff] text-white py-4 rounded-xl font-bold text-sm uppercase">Execute on MT5</button>
    </div>

    <div id="chart-container">
        <div id="tv-widget"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // FUNCTION TO UPDATE CHART & DATA FOR ANY PAIR
        function updateDashboard(pair, entry, target) {
            document.getElementById('active-pair').innerText = pair.replace('FX:', '').replace('OANDA:', '');
            document.getElementById('entry-price').innerText = entry;
            document.getElementById('target-price').innerText = target;
            document.getElementById('pair-display').innerText = pair + " Active";

            // Re-initialize widget with the new pair
            new TradingView.widget({
                "autosize": true,
                "symbol": pair, // Can be FX:GBPUSD, OANDA:XAUUSD, etc.
                "interval": "60",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "enable_publishing": false,
                "allow_symbol_change": true,
                "container_id": "tv-widget"
            });
        }

        // INITIAL LOAD (Default to Gold if no signal)
        window.onload = () => updateDashboard("OANDA:XAUUSD", "2045.50", "2060.00");
    </script>
</body>
</html>
