<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TERMINAL | Liquid Glass</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505;          
            --panel: rgba(18, 18, 18, 0.7);       
            --border: rgba(255, 255, 255, 0.1); 
            --accent: #5e9eff;      
            --bull: #22c55e;        
            --bear: #ef4444; 
            --gold: #fbbf24;
        }

        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 100%);
            color: #ffffff; 
            font-family: 'JetBrains Mono', monospace; 
            height: 100vh; 
            overflow: hidden; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* LIQUID GLASS PANELS */
        .panel { 
            background: var(--panel); 
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border); 
            border-radius: 24px; 
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05), 0 10px 30px rgba(0,0,0,0.5);
        }

        /* NEON PRICE GLOWS */
        .value { font-size: 38px; font-weight: 900; letter-spacing: -2px; text-shadow: 0 0 20px currentColor; }
        .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; }

        /* GRADIENT PRICE CARDS */
        .card-entry { background: linear-gradient(145deg, rgba(251, 191, 36, 0.05), rgba(0,0,0,0)); border-left: 4px solid var(--gold) !important; }
        .card-sl { background: linear-gradient(145deg, rgba(239, 68, 68, 0.1), rgba(0,0,0,0)); border-top: 2px solid var(--bear) !important; }
        .card-tp { background: linear-gradient(145deg, rgba(34, 197, 94, 0.1), rgba(0,0,0,0)); border-top: 2px solid var(--bull) !important; }

        /* LIVE LOG WITH SCANLINES */
        #log-content { 
            font-size: 13px; 
            line-height: 1.8; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
        }

        /* GLITCH ERROR EFFECT */
        .error-log { color: var(--bear); animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-1px, 1px); }
            40% { transform: translate(1px, -1px); }
            100% { transform: translate(0); }
        }

        /* SIDEBAR & MODALS */
        #sidebar { 
            position: fixed; top: 0; right: 0; bottom: 0; width: 85%; max-width: 340px; 
            background: rgba(5, 5, 5, 0.9); border-left: 1px solid var(--border); 
            backdrop-filter: blur(20px); transform: translateX(100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 50; 
        }
        #sidebar.open { transform: translateX(0); }

        input { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 18px; color: white; border-radius: 16px; backdrop-filter: blur(8px); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="cyber-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[10000] hidden flex-col items-center justify-center p-6">
        <div id="cyber-modal" class="panel w-full max-w-sm p-8 flex flex-col gap-5 border-white/10 scale-95 opacity-0 transition-all duration-300">
            <div class="flex items-center gap-4">
                <span id="modal-icon" class="text-2xl"></span>
                <h3 id="modal-title" class="text-sm font-black tracking-[0.3em] uppercase"></h3>
            </div>
            <p id="modal-message" class="text-xs text-gray-400 leading-relaxed"></p>
            <div id="modal-actions" class="flex gap-3 mt-4"></div>
        </div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden" onclick="toggleSidebar()"></div>

    <header class="h-20 flex items-center justify-between px-8 bg-transparent z-10 shrink-0">
        <div class="flex flex-col gap-1">
            <span class="text-xs font-black tracking-tighter text-white/50 uppercase">Elite<span class="text-white">Terminal</span></span>
            <span id="active-pair" class="text-[10px] font-bold text-[#00ff9d] uppercase tracking-[0.2em] flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute h-full w-full rounded-full bg-[#00ff9d] opacity-40"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-[#00ff9d]"></span>
                </span>
                CONNECTING
            </span>
        </div>
        <button onclick="toggleSidebar()" class="panel px-6 py-2.5 text-[11px] font-black uppercase tracking-widest hover:shadow-[0_0_15px_rgba(94,158,255,0.3)] transition-all">Stats ☰</button>
    </header>

    <main class="flex-1 flex flex-col p-4 gap-4">
        <div class="panel card-entry p-8 flex justify-between items-center relative overflow-hidden">
            <span class="label">Primary Entry</span>
            <span id="entry-price" class="value text-[#fbbf24]">0.0000</span>
        </div>

        <div class="grid grid-cols-2 gap-4 shrink-0">
            <div class="panel card-sl p-6 text-center">
                <span class="label block mb-2">Stop Loss</span>
                <span id="stop-loss" class="text-2xl font-black text-[#ef4444] drop-shadow-[0_0_10px_rgba(239,68,68,0.4)]">0.0000</span>
            </div>
            <div class="panel card-tp p-6 text-center">
                <span class="label block mb-2">Take Profit</span>
                <span id="target-price" class="text-2xl font-black text-[#22c55e] drop-shadow-[0_0_10px_rgba(34,197,94,0.4)]">0.0000</span>
            </div>
        </div>

        <div class="panel h-36 overflow-hidden flex flex-col">
            <div class="text-[10px] text-white/20 p-4 border-b border-white/5 font-black tracking-[0.3em] uppercase">Neural Uplink Feed</div>
            <div id="log-content" class="p-5 text-[#5e9eff] overflow-y-auto flex-1 font-medium tracking-wide">
                <div>> Initializing Neural Link...</div>
            </div>
        </div>

        <div class="panel flex-1 relative overflow-hidden border-white/5">
            <div id="tv-widget" class="absolute inset-0 rounded-[24px]"></div>
        </div>
    </main>

    <aside id="sidebar" class="p-8 flex flex-col">
        <h2 class="label mb-8">Node Performance</h2>
        <div class="panel p-8 mb-8 bg-white/5 border-none">
            <span class="label">Efficiency</span>
            <div id="win-rate" class="text-6xl font-black text-[#00ff9d] mt-2">0%</div>
            <p id="trade-count" class="text-xs text-white/40 mt-3 font-bold uppercase tracking-widest">0 Sessions</p>
        </div>
        <div class="flex-1 overflow-y-auto">
            <span class="label mb-6 block">History Audit</span>
            <div id="history-list" class="flex flex-col gap-2"></div>
        </div>
        <button onclick="factoryReset()" class="w-full py-5 text-[10px] font-black text-red-500/50 uppercase border border-red-900/20 rounded-2xl mt-8 hover:bg-red-500/10 transition-all">Sever Uplink (Reset)</button>
    </aside>

    <div id="setup-screen" class="fixed inset-0 bg-[#050505] z-[9999] hidden flex flex-col items-center justify-center p-10">
        <div class="panel w-full max-w-sm p-10 flex flex-col gap-4">
            <h2 class="label text-center mb-6">Initialize Node</h2>
            <input id="setup-url" type="text" placeholder="SUPABASE URL">
            <input id="setup-key" type="password" placeholder="API KEY">
            <input id="setup-pin" type="password" placeholder="PIN CODE">
            <button onclick="saveSetup()" class="w-full py-5 bg-[#5e9eff] text-black font-black rounded-2xl mt-4 uppercase tracking-[0.2em]">Link Database</button>
        </div>
    </div>

    <div id="lock-screen" class="fixed inset-0 bg-[#050505] z-[9999] hidden flex flex-col items-center justify-center p-10">
        <div class="flex flex-col items-center max-w-xs w-full">
            <h2 class="label mb-12">Authorized Access Only</h2>
            <input id="pin-input" type="password" placeholder="••••" class="!bg-transparent !border-b-2 !border-t-0 !border-x-0 !border-white/10 !rounded-none !text-5xl !w-full mb-12 tracking-[0.5em] text-center focus:!border-[#5e9eff] transition-all">
            <button onclick="checkPin()" class="w-full py-5 border-2 border-[#5e9eff] text-[#5e9eff] rounded-2xl font-black uppercase tracking-widest hover:bg-[#5e9eff] hover:text-black transition-all">Access Terminal</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Supabase / Auth Logic (v9.0)
        const S_URL = localStorage.getItem('SUB_URL');
        const S_KEY = localStorage.getItem('SUB_KEY');
        const S_PWD = localStorage.getItem('SUB_PWD');

        // CUSTOM MODALS
        const cOverlay = document.getElementById('cyber-modal-overlay');
        const cModal = document.getElementById('cyber-modal');

        function customAlert(title, message, icon = '🛡️') {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-actions').innerHTML = `<button onclick="closeModal()" class="w-full py-5 panel border-none bg-white/5 font-black uppercase text-[10px] tracking-widest">Acknowledge</button>`;
            cOverlay.classList.replace('hidden', 'flex');
            setTimeout(() => { cModal.classList.replace('scale-95', 'scale-100'); cModal.classList.replace('opacity-0', 'opacity-100'); }, 10);
        }

        function customConfirm(title, message, onConfirm) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            document.getElementById('modal-icon').innerText = '⚠️';
            document.getElementById('modal-actions').innerHTML = `
                <button onclick="closeModal()" class="flex-1 py-5 panel border-none bg-white/5 font-black uppercase text-[10px] tracking-widest">Cancel</button>
                <button id="modal-exec" class="flex-1 py-5 panel border-none bg-red-500 text-black font-black uppercase text-[10px] tracking-widest">Confirm</button>
            `;
            cOverlay.classList.replace('hidden', 'flex');
            setTimeout(() => { cModal.classList.replace('scale-95', 'scale-100'); cModal.classList.replace('opacity-0', 'opacity-100'); }, 10);
            document.getElementById('modal-exec').onclick = () => { closeModal(); onConfirm(); };
        }

        function closeModal() {
            cModal.classList.replace('scale-100', 'scale-95');
            cModal.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => cOverlay.classList.replace('flex', 'hidden'), 300);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function route() {
            if (!S_URL || !S_KEY || !S_PWD) document.getElementById('setup-screen').classList.remove('hidden');
            else document.getElementById('lock-screen').classList.remove('hidden');
        }

        function saveSetup() {
            const url = document.getElementById('setup-url').value.trim();
            const key = document.getElementById('setup-key').value.trim();
            const pin = document.getElementById('setup-pin').value.trim();
            if(!url || !key || !pin) return customAlert("Config Fault", "All node parameters must be defined before activation.");
            localStorage.setItem('SUB_URL', url); localStorage.setItem('SUB_KEY', key); localStorage.setItem('SUB_PWD', pin);
            location.reload();
        }

        function checkPin() {
            if(document.getElementById('pin-input').value === S_PWD) {
                document.getElementById('lock-screen').classList.add('hidden');
                initTerminal();
            } else {
                document.getElementById('pin-input').value = '';
                customAlert("Auth Failed", "Access code rejected. Node remains locked.", "🛑");
            }
        }

        function factoryReset() { 
            customConfirm("Node Purge", "Resetting will clear all local credentials. Proceed?", () => {
                localStorage.clear(); location.reload();
            });
        }

        function addLog(msg) {
            const log = document.getElementById('log-content');
            const isError = msg.includes('FAULT') || msg.includes('Error');
            const logLine = `<div class="${isError ? 'error-log' : ''}">> ${msg}</div>`;
            log.innerHTML = logLine + log.innerHTML;
        }

        async function initTerminal() {
            const _supabase = supabase.createClient(S_URL, S_KEY);
            async function refresh() {
                const { data: all, error } = await _supabase.from('signals').select('*').order('id', { ascending: false });
                if(error) { addLog(`DB FAULT: ${error.message}`); return; }
                if (all) {
                    const wins = all.filter(s => s.status === 'TP').length;
                    const rate = all.length > 0 ? ((wins / all.length) * 100).toFixed(0) : 0;
                    document.getElementById('win-rate').innerText = `${rate}%`;
                    document.getElementById('trade-count').innerText = `${all.length} Sessions`;
                    document.getElementById('history-list').innerHTML = all.slice(0, 8).map(s => `
                        <div class="flex justify-between p-4 panel border-white/5 bg-white/5 hover:scale-[1.02] transition-transform">
                            <span class="font-black text-xs">${s.pair}</span>
                            <span class="${s.status === 'TP' ? 'text-[#00ff9d]' : 'text-[#ef4444]'} text-[10px] font-black">${s.status || 'ACTIVE'}</span>
                        </div>
                    `).join('');
                }
                if (all && all.length > 0) {
                    const s = all[0];
                    document.getElementById('entry-price').innerText = s.entry;
                    document.getElementById('stop-loss').innerText = s.stop_loss || '0.0000';
                    document.getElementById('target-price').innerText = s.target;
                    document.getElementById('active-pair').innerHTML = `
                        <span class="relative flex h-3 w-3"><span class="animate-ping absolute h-full w-full rounded-full bg-[#00ff9d] opacity-40"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-[#00ff9d]"></span></span>
                        ${s.pair}
                    `;
                    addLog(`SYNCED: ${s.pair} NODE`);
                    new TradingView.widget({
                        "autosize": true, "symbol": s.pair.includes(':') ? s.pair : `FX:${s.pair}`,
                        "interval": "15", "theme": "dark", "style": "1",
                        "container_id": "tv-widget", "backgroundColor": "rgba(0,0,0,0)",
                        "gridColor": "rgba(255,255,255,0.05)", "hide_top_toolbar": true, "hide_side_toolbar": true
                    });
                }
            }
            _supabase.channel('db').on('postgres_changes', { event: '*', schema: 'public', table: 'signals' }, refresh).subscribe();
            refresh();
        }
        route();
    </script>
</body>
      </html>
