<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Terminal | Institutional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #c9d1d9; margin: 0; font-family: 'JetBrains Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .panel { background: #0d1117; border: 1px solid #30363d; }
        .data-label { font-size: 9px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
        .data-value { font-size: 14px; font-weight: bold; color: #e6edf3; }
        #sidebar { transition: transform 0.2s ease-in-out; z-index: 100; background: #010409; width: 280px; border-right: 1px solid #30363d; }
        .sidebar-closed { transform: translateX(-280px); }
        .sidebar-open { transform: translateX(0); }
        #tv-container { flex-grow: 1; position: relative; width: 100%; background: #000; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="lock-screen" class="fixed inset-0 bg-black z-[1000] flex flex-col items-center justify-center hidden">
        <h1 class="text-red-500 font-bold mb-4 tracking-tighter">SECURE TERMINAL ACCESS REQUIRED</h1>
        <button onclick="requestAccess()" class="border border-red-500 text-red-500 px-6 py-2 hover:bg-red-500 hover:text-white">INITIATE HANDSHAKE</button>
    </div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 sidebar-closed p-4 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-6 border-b border-[#30363d] pb-2">
            <h2 class="text-[#8b949e] font-bold text-[10px] uppercase tracking-widest">Analytics</h2>
            <button onclick="toggleSidebar()" class="text-gray-500">✕</button>
        </div>
        <div class="grid grid-cols-2 gap-2 mb-6">
            <div class="panel p-3 text-center"><p class="data-label">WIN RATE</p><p id="stat-win" class="data-value text-green-400">--%</p></div>
            <div class="panel p-3 text-center"><p class="data-label">SIGNALS</p><p id="stat-count" class="data-value">0</p></div>
        </div>
        <div class="flex-1 overflow-y-auto">
            <p class="data-label mb-2 border-b border-[#30363d] pb-1">Ledger History</p>
            <div id="signal-history" class="space-y-1 text-[11px]"></div>
        </div>
    </aside>

    <header class="h-12 border-b border-[#30363d] flex items-center px-4 justify-between bg-[#010409] shrink-0">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-[#8b949e]">☰</button>
            <span class="text-white font-bold text-xs uppercase tracking-widest">Elite Terminal <span class="text-blue-500">v2.1</span></span>
        </div>
        <div class="flex items-center gap-3">
            <div class="w-1.5 h-1.5 bg-green-500 rounded-full blink"></div>
            <div id="active-pair" class="text-[11px] font-bold text-[#8b949e] uppercase tracking-widest">AWAITING FEED</div>
        </div>
    </header>

    <div class="panel flex justify-between items-center p-3 shrink-0 m-2 rounded-sm bg-[#0d1117]">
        <div class="flex-1 border-r border-[#30363d] text-center px-2">
            <p class="data-label">Entry</p>
            <p id="entry-price" class="data-value text-yellow-400">0.00000</p>
        </div>
        <div class="flex-1 border-r border-[#30363d] text-center px-2">
            <p class="data-label">Take Profit</p>
            <p id="target-price" class="data-value text-green-400">0.00000</p>
        </div>
        <div class="flex-1 border-r border-[#30363d] text-center px-2">
            <p class="data-label">Stop Loss</p>
            <p id="stop-price" class="data-value text-red-500">--</p>
        </div>
        <div class="flex-1 text-center px-2">
            <p class="data-label">Risk Model</p>
            <p id="risk-type" class="data-value text-blue-400 text-[10px]">SMC/INST</p>
        </div>
    </div>

    <div class="px-2 pb-2 shrink-0">
        <div class="panel bg-[#010409] p-2 relative h-24 overflow-hidden flex flex-col justify-end">
            <div class="absolute top-1 right-2 text-[8px] text-gray-600" id="scan-time">00:00:00</div>
            <div id="log-display" class="text-[9px] text-green-500 space-y-1"></div>
        </div>
    </div>

    <div id="tv-container" class="border-t border-[#30363d]">
        <div id="tv-widget" class="absolute inset-0"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // INJECTED SECRETS
        const SUPABASE_URL = '___SUPABASE_URL___';
        const SUPABASE_KEY = '___SUPABASE_KEY___';
        const ACCESS_CODE = '___TERMINAL_PWD___';

        function requestAccess() {
            const pass = prompt("SECURE TERMINAL ACCESS:");
            if (pass === ACCESS_CODE) {
                sessionStorage.setItem('terminal_auth', pass);
                location.reload();
            }
        }

        if (sessionStorage.getItem('terminal_auth') !== ACCESS_CODE) {
            document.getElementById('lock-screen').classList.remove('hidden');
        }

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-closed');
            document.getElementById('sidebar').classList.toggle('sidebar-open');
        }

        function terminalLog(msg, type = 'info') {
            const log = document.getElementById('log-display');
            const entry = document.createElement('div');
            const colors = { signal: 'text-green-400 font-bold', alert: 'text-yellow-500', info: 'text-gray-500' };
            entry.innerHTML = `<span class="text-[#30363d]">[${new Date().toLocaleTimeString()}]</span> <span class="${colors[type]}">> ${msg}</span>`;
            log.appendChild(entry);
            if (log.children.length > 20) log.firstChild.remove();
        }

        async function updateTerminal() {
            const { data } = await _supabase.from('signals').select('*').order('id', { ascending: false });
            if (data && data.length > 0) {
                const latest = data[0];
                document.getElementById('active-pair').innerText = latest.pair.replace('FX:', '');
                document.getElementById('entry-price').innerText = latest.entry;
                document.getElementById('target-price').innerText = latest.target;
                
                document.getElementById('signal-history').innerHTML = data.slice(0, 10).map(s => `
                    <div class="flex justify-between py-1 border-b border-[#21262d]">
                        <span>${s.pair.replace('FX:','')}</span>
                        <span class="${s.status === 'WIN' ? 'text-green-500' : 'text-blue-400'}">${s.status || 'OPEN'}</span>
                    </div>`).join('');
                
                new TradingView.widget({ "autosize": true, "symbol": latest.pair, "interval": "15", "theme": "dark", "container_id": "tv-widget" });
                terminalLog(`SMC structure detected on ${latest.pair}`, 'signal');
            }
        }

        _supabase.channel('signals-live').on('postgres_changes', { event: '*', schema: 'public', table: 'signals' }, () => updateTerminal()).subscribe();
        updateTerminal();
        terminalLog("Institutional Engine Online.", "info");
    </script>
</body>
</html>
