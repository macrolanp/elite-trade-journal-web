<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TERMINAL | Cyber-Trader</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* CYBER-TRADER THEME */
        :root { 
            --bg: #0a0a0a;          
            --panel: #111111;       
            --border: #1e1e1e; 
            --accent: #5e9eff;      
            --bull: #22c55e;        
            --bear: #ef4444; 
            --gold: #fbbf24;
            --glow-accent: rgba(94, 158, 255, 0.08);
        }

        body { 
            background: var(--bg); 
            color: #ffffff; 
            font-family: 'JetBrains Mono', monospace; 
            height: 100vh; 
            overflow: hidden; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* SIDEBAR - GLASSMORPHISM */
        #sidebar { 
            position: fixed; top: 0; right: 0; bottom: 0; width: 85%; max-width: 340px; 
            background: rgba(10, 10, 10, 0.95); border-left: 1px solid var(--border); 
            backdrop-filter: blur(12px);
            transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; 
        }
        #sidebar.open { transform: translateX(0); box-shadow: -20px 0 50px rgba(0,0,0,0.8); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 40; display: none; }
        .overlay.active { display: block; }

        /* NEON PANELS & TYPOGRAPHY */
        .panel { 
            background: linear-gradient(145deg, var(--panel), var(--bg)); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            box-shadow: 0 4px 20px var(--glow-accent);
        }
        .label { font-size: 12px; color: #888888; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        .value { font-size: 32px; font-weight: 900; letter-spacing: -1.5px; } 
        
        /* NEON GLOWS */
        #entry-price { color: var(--gold); text-shadow: 0 0 12px rgba(251, 191, 36, 0.4); }
        #stop-loss { color: var(--bear); text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
        #target-price { color: var(--bull); text-shadow: 0 0 10px rgba(34, 197, 94, 0.4); }

        .history-row { display: flex; justify-content: space-between; font-size: 13px; padding: 14px 12px; border-bottom: 1px solid var(--border); border-radius: 8px; transition: all 0.2s; }
        .history-row:hover { background: rgba(255,255,255,0.03); transform: translateX(4px); }
        
        #log-content { font-size: 12.5px; line-height: 1.7; }

        /* STANDARD MOBILE INPUTS */
        .fullscreen-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        input { background: rgba(17, 17, 17, 0.8); border: 1px solid var(--border); padding: 16px; color: white; margin-bottom: 16px; width: 100%; outline: none; text-align: center; font-size: 16px; border-radius: 12px; backdrop-filter: blur(8px); transition: border-color 0.2s; }
        input:focus { border-color: var(--accent); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <span class="text-sm font-bold tracking-widest text-[#5e9eff]">ANALYTICS</span>
            <button onclick="toggleSidebar()" class="text-sm font-bold text-gray-500 hover:text-white transition-colors">✕</button>
        </div>
        
        <div class="mb-8 panel p-6">
            <span class="label">WIN RATE</span>
            <div id="win-rate" class="text-5xl font-extrabold text-[#22c55e] mt-2 drop-shadow-[0_0_12px_rgba(34,197,94,0.3)]">0%</div>
            <p id="trade-count" class="text-sm text-gray-400 font-bold mt-2">0 Executed</p>
        </div>

        <div class="flex-1 overflow-y-auto">
            <span class="label mb-4 block">RECENT SIGNALS</span>
            <div id="history-list" class="flex flex-col gap-1"></div>
        </div>

        <button onclick="factoryReset()" class="w-full py-4 text-xs font-bold text-red-500/70 uppercase border border-red-900/50 rounded-xl mt-6 hover:bg-red-900/20 transition-colors">Wipe System Data</button>
    </aside>

    <div id="setup-screen" class="fullscreen-overlay hidden">
        <h2 class="text-sm text-[#5e9eff] mb-10 tracking-[.3em] font-black uppercase text-shadow-[0_0_10px_rgba(94,158,255,0.4)]">Initialize Node</h2>
        <input id="setup-url" type="text" placeholder="SUPABASE URL">
        <input id="setup-key" type="password" placeholder="API KEY">
        <input id="setup-pin" type="password" placeholder="CREATE PIN">
        <button onclick="saveSetup()" class="w-full py-5 bg-[#5e9eff] text-black font-black rounded-xl text-sm uppercase mt-4 hover:scale-[1.02] transition-transform">Activate Terminal</button>
    </div>

    <div id="lock-screen" class="fullscreen-overlay hidden">
        <h2 class="text-xs text-gray-500 tracking-[.5em] mb-12 uppercase">Authorization</h2>
        <input id="pin-input" type="password" placeholder="••••" class="!bg-transparent !border-b-2 !border-t-0 !border-x-0 !border-[#1e1e1e] focus:!border-[#5e9eff] !rounded-none !text-4xl !w-48 mb-12 tracking-[.5em] transition-colors">
        <button onclick="checkPin()" class="w-full max-w-[200px] border-2 border-[#5e9eff] text-[#5e9eff] py-4 rounded-xl font-black text-sm hover:bg-[#5e9eff] hover:text-black transition-all">UNLOCK</button>
    </div>

    <header class="h-16 border-b border-[#1e1e1e] flex items-center justify-between px-6 bg-[#0a0a0a] z-10 shrink-0">
        <div class="flex flex-col gap-1">
            <span class="text-xs font-black tracking-tighter text-white">ELITE<span class="text-[#5e9eff]">TERM</span></span>
            
            <span id="active-pair" class="text-[10px] font-bold text-[#22c55e] uppercase tracking-widest flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-[#22c55e]"></span>
                </span>
                STANDBY
            </span>

        </div>
        <button onclick="toggleSidebar()" class="bg-[#111111] px-5 py-2.5 rounded-xl text-[11px] font-black border border-[#1e1e1e] shadow-[0_0_10px_rgba(255,255,255,0.02)] active:scale-95 transition-transform">STATS ☰</button>
    </header>

    <main class="flex-1 flex flex-col p-3 gap-3 bg-[#0a0a0a]">
        <div class="panel p-6 flex justify-between items-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 h-full bg-[#fbbf24] shadow-[0_0_10px_#fbbf24]"></div>
            <span class="label">Entry</span>
            <span id="entry-price" class="value">0.0000</span>
        </div>

        <div class="grid grid-cols-2 gap-3 shrink-0">
            <div class="panel p-5 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-[#ef4444] shadow-[0_0_10px_#ef4444]"></div>
                <span class="label block mb-2">Stop Loss</span>
                <span id="stop-loss" class="text-2xl font-bold">0.0000</span>
            </div>
            <div class="panel p-5 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-[#22c55e] shadow-[0_0_10px_#22c55e]"></div>
                <span class="label block mb-2">Target</span>
                <span id="target-price" class="text-2xl font-bold">0.0000</span>
            </div>
        </div>

        <div class="panel h-32 overflow-hidden flex flex-col">
            <div class="text-[10px] text-gray-500 p-3 border-b border-[#1e1e1e] font-bold tracking-[.2em]">LIVE SYSTEM LOGS</div>
            <div id="log-content" class="p-4 text-[#5e9eff] overflow-y-auto flex-1 font-medium">
                <div>> Initializing core systems...</div>
                <div>> Establishing secure uplink...</div>
            </div>
        </div>

        <div class="panel flex-1 relative overflow-hidden">
            <div id="tv-widget" class="absolute inset-0 rounded-xl overflow-hidden"></div>
        </div>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const S_URL = localStorage.getItem('SUB_URL');
        const S_KEY = localStorage.getItem('SUB_KEY');
        const S_PWD = localStorage.getItem('SUB_PWD');

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function route() {
            if (!S_URL || !S_KEY || !S_PWD) document.getElementById('setup-screen').classList.remove('hidden');
            else document.getElementById('lock-screen').classList.remove('hidden');
        }

        function saveSetup() {
            localStorage.setItem('SUB_URL', document.getElementById('setup-url').value.trim());
            localStorage.setItem('SUB_KEY', document.getElementById('setup-key').value.trim());
            localStorage.setItem('SUB_PWD', document.getElementById('setup-pin').value.trim());
            location.reload();
        }

        function checkPin() {
            if(document.getElementById('pin-input').value === S_PWD) {
                document.getElementById('lock-screen').classList.add('hidden');
                initTerminal();
            } else alert("ACCESS DENIED"); // We will fix this native alert next if you want!
        }

        function factoryReset() { if(confirm("Wipe all local keys and reset?")) { localStorage.clear(); location.reload(); } }

        function addLog(msg) {
            const log = document.getElementById('log-content');
            log.innerHTML = `<div>> ${msg}</div>` + log.innerHTML;
        }

        async function initTerminal() {
            const _supabase = supabase.createClient(S_URL, S_KEY);
            
            async function refresh() {
                const { data: all, error } = await _supabase.from('signals').select('*').order('id', { ascending: false });
                
                if(error) {
                    addLog(`<span style="color:#ef4444">DB ERROR: ${error.message}</span>`);
                    return;
                }

                if (all) {
                    const wins = all.filter(s => s.status === 'TP').length;
                    const rate = all.length > 0 ? ((wins / all.length) * 100).toFixed(0) : 0;
                    document.getElementById('win-rate').innerText = `${rate}%`;
                    document.getElementById('trade-count').innerText = `${all.length} Total Trades`;
                    document.getElementById('history-list').innerHTML = all.slice(0, 8).map(s => `
                        <div class="history-row">
                            <span class="font-bold text-gray-300">${s.pair}</span>
                            <span class="${s.status === 'TP' ? 'text-[#22c55e] drop-shadow-[0_0_5px_rgba(34,197,94,0.5)]' : 'text-[#ef4444]'} font-black tracking-widest">${s.status || 'ACTIVE'}</span>
                        </div>
                    `).join('');
                }

                if (all && all.length > 0) {
                    const s = all[0];
                    document.getElementById('entry-price').innerText = s.entry;
                    document.getElementById('stop-loss').innerText = s.stop_loss || '0.0000';
                    document.getElementById('target-price').innerText = s.target;
                    
                    // Keep the pulsing dot, just change the text
                    document.getElementById('active-pair').innerHTML = `
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-[#22c55e]"></span>
                        </span>
                        ${s.pair}
                    `;
                    
                    addLog(`SYNCED: ${s.pair} @ ${s.entry}`);

                    new TradingView.widget({
                        "autosize": true, "symbol": s.pair.includes(':') ? s.pair : `FX:${s.pair}`,
                        "interval": "15", "theme": "dark", "style": "1",
                        "container_id": "tv-widget", "backgroundColor": "#111111",
                        "gridColor": "#1e1e1e", "hide_top_toolbar": true, "hide_side_toolbar": true
                    });
                }
            }

            _supabase.channel('db').on('postgres_changes', { event: '*', schema: 'public', table: 'signals' }, refresh).subscribe();
            refresh();
        }
        route();
    </script>
</body>
          </html>
