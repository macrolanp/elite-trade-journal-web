<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TERMINAL | AMOLED</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* AMOLED TRUE BLACK THEME */
        :root { 
            --bg: #000000; 
            --panel: #000000; 
            --border: #222222; 
            --accent: #58a6ff; 
            --bull: #3fb950; 
            --bear: #f85149; 
            --gold: #d29922;
        }

        body { 
            background: var(--bg); 
            color: #ffffff; 
            font-family: 'JetBrains Mono', monospace; 
            height: 100vh; 
            overflow: hidden; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* SIDEBAR - AMOLED STYLE */
        #sidebar { 
            position: fixed; top: 0; right: 0; bottom: 0; width: 85%; max-width: 320px; 
            background: var(--bg); border-left: 1px solid var(--border); 
            transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; 
        }
        #sidebar.open { transform: translateX(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 40; display: none; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }

        /* INCREASED FONT SIZES */
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; }
        .label { font-size: 11px; color: #888888; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
        .value { font-size: 24px; font-weight: 800; letter-spacing: -1px; } /* Large readable prices */
        
        .history-row { display: flex; justify-content: space-between; font-size: 13px; padding: 12px 0; border-bottom: 1px solid #111111; }
        
        /* STANDARD MOBILE INPUTS */
        .fullscreen-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        input { background: #111111; border: 1px solid var(--border); padding: 16px; color: white; margin-bottom: 12px; width: 100%; outline: none; text-align: center; font-size: 16px; border-radius: 12px; }
        
        /* TOUCH TARGET BUTTONS */
        .btn-primary { width: 100%; py: 18px; background: var(--accent); color: black; font-weight: 800; border-radius: 12px; font-size: 14px; text-transform: uppercase; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="p-6">
        <div class="flex justify-between items-center mb-8">
            <span class="text-sm font-bold tracking-widest text-[#58a6ff]">ANALYTICS</span>
            <button onclick="toggleSidebar()" class="text-sm font-bold text-red-500">CLOSE</button>
        </div>
        
        <div class="mb-8">
            <span class="label">WIN RATE</span>
            <div id="win-rate" class="text-5xl font-extrabold text-[#3fb950] mt-2">0%</div>
        </div>

        <div class="mb-8">
            <span class="label">TOTAL TRADES</span>
            <p id="trade-count" class="text-xl font-bold mt-1">0 Executed</p>
        </div>

        <div class="flex-1">
            <span class="label mb-4 block">RECENT SIGNALS</span>
            <div id="history-list"></div>
        </div>

        <button onclick="factoryReset()" class="w-full py-4 text-[10px] text-gray-600 uppercase border border-gray-900 rounded-xl mt-4">Wipe System</button>
    </aside>

    <div id="setup-screen" class="fullscreen-overlay hidden">
        <h2 class="text-sm text-[#58a6ff] mb-10 tracking-[.3em] font-black uppercase">Initialize Node</h2>
        <input id="setup-url" type="text" placeholder="SUPABASE URL">
        <input id="setup-key" type="password" placeholder="API KEY">
        <input id="setup-pin" type="password" placeholder="CREATE PIN">
        <button onclick="saveSetup()" class="w-full py-5 bg-[#58a6ff] text-black font-black rounded-2xl text-sm uppercase">Activate Terminal</button>
    </div>

    <div id="lock-screen" class="fullscreen-overlay hidden">
        <h2 class="text-xs text-gray-500 tracking-[.5em] mb-12 uppercase">Authorization Required</h2>
        <input id="pin-input" type="password" placeholder="••••" class="!bg-transparent !border-b-2 !border-t-0 !border-x-0 !rounded-none !text-4xl !w-48 mb-12 tracking-widest">
        <button onclick="checkPin()" class="w-full max-w-[200px] border-2 border-[#58a6ff] text-[#58a6ff] py-4 rounded-2xl font-black text-sm">UNLOCK</button>
    </div>

    <header class="h-16 border-b border-[#222222] flex items-center justify-between px-6 bg-black z-10 shrink-0">
        <div class="flex flex-col">
            <span class="text-xs font-black tracking-tighter">ELITE<span class="text-[#58a6ff]">TERM</span></span>
            <span id="active-pair" class="text-[9px] font-bold text-[#3fb950] uppercase tracking-widest">CONNECTING...</span>
        </div>
        <button onclick="toggleSidebar()" class="bg-[#111111] px-5 py-2 rounded-xl text-[11px] font-black border border-[#333333]">STATS ☰</button>
    </header>

    <main class="flex-1 flex flex-col p-2 gap-2 bg-black">
        <div class="grid grid-cols-1 gap-2 shrink-0">
            <div class="panel p-5 flex justify-between items-center border-[#d29922]/30">
                <span class="label">Entry</span>
                <span id="entry-price" class="value text-[#d29922]">0.0000</span>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div class="panel p-5 text-center border-[#f85149]/30">
                    <span class="label block mb-2">Stop Loss</span>
                    <span id="stop-loss" class="text-lg font-bold text-[#f85149]">0.0000</span>
                </div>
                <div class="panel p-5 text-center border-[#3fb950]/30">
                    <span class="label block mb-2">Target</span>
                    <span id="target-price" class="text-lg font-bold text-[#3fb950]">0.0000</span>
                </div>
            </div>
        </div>

        <div class="panel h-28 overflow-hidden flex flex-col border-[#222222]">
            <div class="text-[9px] text-gray-600 p-2 border-b border-[#222222] font-black tracking-widest">LIVE DATA FEED</div>
            <div id="log-content" class="p-3 text-[11px] text-[#58a6ff] overflow-y-auto flex-1 font-medium leading-relaxed">
                > Initializing...
            </div>
        </div>

        <div class="panel flex-1 relative overflow-hidden rounded-xl border-[#222222]">
            <div id="tv-widget" class="absolute inset-0"></div>
        </div>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const S_URL = localStorage.getItem('SUB_URL');
        const S_KEY = localStorage.getItem('SUB_KEY');
        const S_PWD = localStorage.getItem('SUB_PWD');

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function route() {
            if (!S_URL || !S_KEY || !S_PWD) document.getElementById('setup-screen').classList.remove('hidden');
            else document.getElementById('lock-screen').classList.remove('hidden');
        }

        function saveSetup() {
            localStorage.setItem('SUB_URL', document.getElementById('setup-url').value.trim());
            localStorage.setItem('SUB_KEY', document.getElementById('setup-key').value.trim());
            localStorage.setItem('SUB_PWD', document.getElementById('setup-pin').value.trim());
            location.reload();
        }

        function checkPin() {
            if(document.getElementById('pin-input').value === S_PWD) {
                document.getElementById('lock-screen').classList.add('hidden');
                initTerminal();
            } else alert("INVALID PIN");
        }

        function factoryReset() { if(confirm("ERASE ALL DATA?")) { localStorage.clear(); location.reload(); } }

        function addLog(msg) {
            const log = document.getElementById('log-content');
            log.innerHTML = `<div>> ${msg}</div>` + log.innerHTML;
        }

        async function initTerminal() {
            const _supabase = supabase.createClient(S_URL, S_KEY);
            
            async function refresh() {
                const { data: all } = await _supabase.from('signals').select('*').order('id', { ascending: false });
                if (all) {
                    const wins = all.filter(s => s.status === 'TP').length;
                    const rate = all.length > 0 ? ((wins / all.length) * 100).toFixed(0) : 0;
                    document.getElementById('win-rate').innerText = `${rate}%`;
                    document.getElementById('trade-count').innerText = `${all.length} Total Trades`;
                    document.getElementById('history-list').innerHTML = all.slice(0, 5).map(s => `
                        <div class="history-row">
                            <span class="font-bold">${s.pair}</span>
                            <span class="${s.status === 'TP' ? 'text-[#3fb950]' : 'text-[#f85149]'} font-black">${s.status || 'ACTIVE'}</span>
                        </div>
                    `).join('');
                }

                const { data: latest } = await _supabase.from('signals').select('*').order('id', { ascending: false }).limit(1);
                if (latest && latest.length > 0) {
                    const s = latest[0];
                    document.getElementById('entry-price').innerText = s.entry;
                    document.getElementById('stop-loss').innerText = s.stop_loss || '0.0000';
                    document.getElementById('target-price').innerText = s.target;
                    document.getElementById('active-pair').innerText = s.pair;
                    addLog(`SYNCED: ${s.pair}`);

                    new TradingView.widget({
                        "autosize": true, "symbol": s.pair.includes(':') ? s.pair : `FX:${s.pair}`,
                        "interval": "15", "theme": "dark", "style": "1",
                        "container_id": "tv-widget", "backgroundColor": "#000000",
                        "gridColor": "#111111", "hide_top_toolbar": true, "hide_side_toolbar": true
                    });
                }
            }

            _supabase.channel('db').on('postgres_changes', { event: '*', schema: 'public', table: 'signals' }, refresh).subscribe();
            refresh();
        }
        route();
    </script>
</body>
  </html>
