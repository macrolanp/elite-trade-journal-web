<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Journal | Live AI Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #131722; color: #d1d4dc; margin: 0; padding: 15px; font-family: sans-serif; }
        .card { background: #1e222d; border: 1px solid #363a45; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        #chart-container { width: 100%; height: 420px; border-radius: 12px; overflow: hidden; border: 1px solid #363a45; }
    </style>
</head>
<body>
    <header class="flex justify-between items-center mb-6 px-1">
        <h1 class="text-xl font-bold text-white uppercase tracking-tighter">Elite Journal</h1>
        <div class="flex items-center gap-2">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            <span class="text-[10px] text-green-400 font-bold uppercase" id="status-text">Live Syncing</span>
        </div>
    </header>

    <div class="card border-l-4 border-l-blue-600 shadow-2xl">
        <div class="flex justify-between items-center mb-4">
            <span id="active-pair" class="text-lg font-bold text-white">---</span>
            <span id="active-confidence" class="bg-blue-900/40 text-blue-400 text-[10px] px-2 py-1 rounded font-bold uppercase">Waiting for AI...</span>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-5">
            <div class="bg-[#2a2e39] p-3 rounded-lg text-center border border-[#363a45]">
                <p class="text-[9px] text-gray-400 uppercase font-bold mb-1">Entry Price</p>
                <p id="entry-price" class="text-md font-mono text-white font-bold">0.00000</p>
            </div>
            <div class="bg-[#2a2e39] p-3 rounded-lg text-center border border-[#363a45]">
                <p class="text-[9px] text-gray-400 uppercase font-bold mb-1">Take Profit</p>
                <p id="target-price" class="text-md font-mono text-green-400 font-bold">0.00000</p>
            </div>
        </div>

        <button onclick="alert('Proceeding to MT5 with latest signal')" 
                class="w-full bg-[#2962ff] active:bg-[#1e48f1] text-white py-4 rounded-xl font-bold text-sm shadow-lg transition-all active:scale-95 uppercase tracking-widest">
            Execute on MT5
        </button>
    </div>

    <div id="chart-container">
        <div id="tv-widget" style="width: 100%; height: 100%;"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // 2. SUPABASE CONFIGURATION
        const SUPABASE_URL = 'https://sktishfzpeenrtkmihwg.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdGlzaGZ6cGVlbnJ0a21paHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Mjg2NzYsImV4cCI6MjA4ODIwNDY3Nn0.QwVi1PzWDJcti3IdQjrLL-bLipKT8CTJNNHqpWFXLr4'; // Replace this!
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Function to update the UI
        function updateUI(pair, entry, target, confidence) {
            document.getElementById('active-pair').innerText = pair.replace('FX:', '').replace('OANDA:', '');
            document.getElementById('entry-price').innerText = entry;
            document.getElementById('target-price').innerText = target;
            document.getElementById('active-confidence').innerText = `AI ${confidence} MATCH`;

            new TradingView.widget({
                "autosize": true,
                "symbol": pair,
                "interval": "60",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "container_id": "tv-widget"
            });
        }

        // 3. REALTIME LISTENER (Wait for new bot signals)
        _supabase
            .channel('public:signals')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'signals' }, payload => {
                const s = payload.new;
                updateUI(s.pair, s.entry, s.target, s.confidence);
            })
            .subscribe();

        // 4. INITIAL FETCH (Load most recent signal on startup)
        async function fetchLatest() {
            const { data, error } = await _supabase
                .from('signals')
                .select('*')
                .order('id', { ascending: false })
                .limit(1);

            if (data && data[0]) {
                const s = data[0];
                updateUI(s.pair, s.entry, s.target, s.confidence);
            }
        }
        fetchLatest();
    </script>
</body>
</html>
