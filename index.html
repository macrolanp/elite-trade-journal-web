<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Terminal | Private</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #c9d1d9; font-family: 'JetBrains Mono', monospace; height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }
        .data-label { font-size: 9px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body>

    <div id="setup-screen" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center p-6 hidden">
        <h1 class="text-red-500 font-bold mb-2 tracking-widest">SYSTEM INITIALIZATION</h1>
        <p class="text-[10px] text-gray-500 mb-8 text-center">LOCAL VAULT SETUP - KEYS NEVER LEAVE THIS DEVICE</p>
        
        <input id="in-url" type="text" placeholder="Supabase URL" class="mb-4 w-full max-w-sm p-3 bg-[#0d1117] border border-[#30363d] text-white text-xs focus:border-red-500 focus:outline-none">
        <input id="in-key" type="password" placeholder="Supabase Anon Key" class="mb-4 w-full max-w-sm p-3 bg-[#0d1117] border border-[#30363d] text-white text-xs focus:border-red-500 focus:outline-none">
        <input id="in-pwd" type="password" placeholder="Create Handshake Password" class="mb-8 w-full max-w-sm p-3 bg-[#0d1117] border border-[#30363d] text-white text-xs focus:border-red-500 focus:outline-none">
        
        <button onclick="saveSetup()" class="border border-red-500 text-red-500 px-6 py-2 text-sm hover:bg-red-500 hover:text-white transition-all">ENCRYPT & SAVE LOCALLY</button>
    </div>

    <div id="lock-screen" class="fixed inset-0 bg-black z-40 flex flex-col items-center justify-center hidden">
        <h1 class="text-red-500 font-bold mb-6 tracking-tighter">SECURE TERMINAL ACCESS REQUIRED</h1>
        <input id="login-pwd" type="password" placeholder="ENTER ACCESS KEY" class="mb-6 text-center bg-transparent border-b border-red-500 text-white text-lg focus:outline-none pb-2">
        <button onclick="requestAccess()" class="border border-red-500 text-red-500 px-6 py-2 hover:bg-red-500 hover:text-white transition-all">INITIATE HANDSHAKE</button>
        <button onclick="resetVault()" class="mt-12 text-[10px] text-gray-700 hover:text-red-500 transition-all">FACTORY RESET TERMINAL</button>
    </div>

    <header class="h-12 border-b border-[#30363d] flex items-center px-4 justify-between bg-[#010409] shrink-0">
        <span class="text-white font-bold text-xs uppercase tracking-widest">Elite Terminal <span class="text-blue-500">v3.0</span></span>
        <div id="active-pair" class="text-[11px] font-bold text-[#8b949e] uppercase tracking-widest">AWAITING FEED</div>
    </header>

    <div class="flex justify-between items-center p-3 shrink-0 m-2 rounded-sm bg-[#0d1117] border border-[#30363d]">
        <div class="flex-1 border-r border-[#30363d] text-center px-2">
            <p class="data-label">Entry</p>
            <p id="entry-price" class="text-yellow-400 font-bold text-sm">0.00000</p>
        </div>
        <div class="flex-1 text-center px-2">
            <p class="data-label">Take Profit</p>
            <p id="target-price" class="text-green-400 font-bold text-sm">0.00000</p>
        </div>
    </div>

    <div id="tv-container" class="flex-1 relative border-t border-[#30363d]">
        <div id="tv-widget" class="absolute inset-0"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // ROUTER: Check if device is configured
        if (!localStorage.getItem('SUB_URL')) {
            document.getElementById('setup-screen').classList.remove('hidden');
        } else {
            document.getElementById('lock-screen').classList.remove('hidden');
        }

        function saveSetup() {
            const url = document.getElementById('in-url').value.trim();
            const key = document.getElementById('in-key').value.trim();
            const pwd = document.getElementById('in-pwd').value.trim();
            
            if(url && key && pwd) {
                localStorage.setItem('SUB_URL', url);
                localStorage.setItem('SUB_KEY', key);
                localStorage.setItem('SUB_PWD', pwd);
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('lock-screen').classList.remove('hidden');
            } else {
                alert("SYSTEM ERROR: ALL FIELDS REQUIRED");
            }
        }

        function requestAccess() {
            const input = document.getElementById('login-pwd').value;
            const savedPwd = localStorage.getItem('SUB_PWD');
            
            if (input === savedPwd) {
                document.getElementById('lock-screen').classList.add('hidden');
                initTerminal();
            } else {
                alert("ACCESS DENIED");
            }
        }

        function resetVault() {
            if(confirm("WARNING: This will wipe your keys from this device. Continue?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function initTerminal() {
            const url = localStorage.getItem('SUB_URL');
            const key = localStorage.getItem('SUB_KEY');
            const _supabase = supabase.createClient(url, key);
            
            async function refresh() {
                const { data, error } = await _supabase.from('signals').select('*').order('id', { ascending: false });
                if (error) { 
                    alert("DB ERROR: Invalid Supabase Keys. Please Factory Reset."); 
                    return; 
                }
                if (data && data.length > 0) {
                    const latest = data[0];
                    document.getElementById('active-pair').innerText = latest.pair.replace('FX:', '');
                    document.getElementById('entry-price').innerText = latest.entry;
                    document.getElementById('target-price').innerText = latest.target;
                    new TradingView.widget({ "autosize": true, "symbol": latest.pair, "interval": "15", "theme": "dark", "container_id": "tv-widget" });
                }
            }

            _supabase.channel('live').on('postgres_changes', { event: '*', schema: 'public', table: 'signals' }, refresh).subscribe();
            refresh();
        }
    </script>
</body>
</html>
