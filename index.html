<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Terminal | Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Forces the body to be exactly the height of the phone screen */
        body { background-color: #0B0E11; color: #d1d4dc; margin: 0; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* FIX: Ensures TradingView has a container with actual height */
        #tv-container { 
            flex-grow: 1; 
            width: 100%; 
            position: relative; 
            background: #000;
            border-top: 1px solid #30363d;
        }
    </style>
</head>
<body>

    <header class="h-14 border-b border-[#30363d] flex items-center px-4 justify-between bg-[#0B0E11] shrink-0">
        <div class="flex items-center gap-2">
            <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
            <span class="text-white font-bold italic uppercase text-xs tracking-tighter">Elite Journal</span>
        </div>
        <div id="active-pair" class="text-[10px] font-mono text-gray-500 font-bold uppercase">Ready</div>
    </header>

    <div class="p-3 bg-[#0D1117] shrink-0">
        <div class="grid grid-cols-2 gap-2 mb-3">
            <div class="bg-[#161B22] p-2 rounded border border-[#30363d] text-center">
                <p class="text-[8px] text-gray-400 uppercase font-bold mb-1">Entry</p>
                <p id="entry-price" class="text-sm font-mono text-white">0.00000</p>
            </div>
            <div class="bg-[#161B22] p-2 rounded border border-[#30363d] text-center">
                <p class="text-[8px] text-gray-400 uppercase font-bold mb-1">Take Profit</p>
                <p id="target-price" class="text-sm font-mono text-green-400">0.00000</p>
            </div>
        </div>
        
        <button onclick="alert('MT5 Execution Triggered')" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold py-3.5 rounded-lg uppercase tracking-widest shadow-lg active:scale-95 transition-all">
            Execute on MT5
        </button>
    </div>

    <div id="tv-container">
        <div id="tv-widget" class="absolute inset-0"></div>
    </div>

    <footer class="h-8 border-t border-[#30363d] bg-[#0B0E11] flex items-center px-4 shrink-0">
        <div id="sys-log" class="text-[9px] text-blue-400 font-mono italic">Syncing with 'signals' table...</div>
    </footer>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const SUPABASE_URL = 'https://sktishfzpeenrtkmihwg.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdGlzaGZ6cGVlbnJ0a21paHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Mjg2NzYsImV4cCI6MjA4ODIwNDY3Nn0.QwVi1PzWDJcti3IdQjrLL-bLipKT8CTJNNHqpWFXLr4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function loadTradingView(symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol || "FX:EURUSD",
                "interval": "15",
                "theme": "dark",
                "style": "1",
                "container_id": "tv-widget",
                "hide_side_toolbar": true,
                "allow_symbol_change": true,
                "save_image": false
            });
        }

        async function refreshSignal() {
            // Updated to use lowercase 'signals' to match your DB dashboard
            const { data, error } = await _supabase
                .from('signals')
                .select('*')
                .order('id', { ascending: false })
                .limit(1);

            if (data && data[0]) {
                const s = data[0];
                document.getElementById('active-pair').innerText = s.pair.replace('FX:', '');
                document.getElementById('entry-price').innerText = s.entry;
                document.getElementById('target-price').innerText = s.target;
                document.getElementById('sys-log').innerText = `AI Signal: ${s.pair} Detected`;
                loadTradingView(s.pair);
            }
        }

        // Realtime listener for the 'signals' table
        _supabase.channel('db-sync')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'signals' }, refreshSignal)
            .subscribe();

        // Initial launch
        refreshSignal();
        
        // Safety fallback: if no signal is found in 2 seconds, load EURUSD
        setTimeout(() => {
            if (!document.querySelector('iframe')) loadTradingView("FX:EURUSD");
        }, 2000);
    </script>
</body>
</html>
