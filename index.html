<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Trade Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #131722; color: #d1d4dc; margin: 0; padding: 12px; font-family: sans-serif; }
        #chart-container { width: 100%; height: 380px; background: #1e222d; border: 1px solid #363a45; border-radius: 12px; overflow: hidden; }
        #tv-chart { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <header class="mb-4 flex justify-between items-center px-1">
        <h1 class="text-xl font-bold text-white">Elite Journal</h1>
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-ping"></div>
            <span class="text-[10px] text-green-400 font-bold uppercase">Bot Live</span>
        </div>
    </header>

    <div id="chart-container" class="shadow-xl mb-6">
        <div id="tv-chart"></div>
    </div>

    <button onclick="location.reload()" class="w-full mb-6 bg-[#2a2e39] text-gray-400 py-2 rounded text-[10px] font-bold uppercase tracking-widest border border-[#363a45]">
        ↻ Hard Refresh Dashboard
    </button>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        window.addEventListener('load', () => {
            const container = document.getElementById('tv-chart');
            if (!container) {
                console.error("Chart container not found");
                return;
            }

            // Give browser a moment to finalize layout
            setTimeout(() => {
                const chart = LightweightCharts.createChart(container, {
                    width: container.clientWidth,
                    height: container.clientHeight,
                    layout: { 
                        background: { color: '#1e222d' }, 
                        textColor: '#d1d4dc' 
                    },
                    grid: { 
                        vertLines: { color: '#2b2e3a' }, 
                        horzLines: { color: '#2b2e3a' } 
                    },
                    timeScale: { 
                        borderColor: '#363a45', 
                        timeVisible: true,
                        secondsVisible: false 
                    }
                });

                const candleSeries = chart.addCandlestickSeries({
                    upColor: '#26a69a', 
                    downColor: '#ef5350', 
                    borderVisible: false,
                    wickUpColor: '#26a69a', 
                    wickDownColor: '#ef5350'
                });

                // Your sample data
                candleSeries.setData([
                    { time: '2026-03-01', open: 1.2500, high: 1.2580, low: 1.2450, close: 1.2530 },
                    { time: '2026-03-02', open: 1.2530, high: 1.2650, low: 1.2520, close: 1.2610 },
                    { time: '2026-03-03', open: 1.2610, high: 1.2700, low: 1.2580, close: 1.2645 },
                    { time: '2026-03-04', open: 1.2645, high: 1.2680, low: 1.2620, close: 1.2660 }
                ]);

                // This is usually the missing piece — auto zoom to data
                chart.timeScale().fitContent();

                // Force resize (helps on mobile)
                chart.resize(container.clientWidth, container.clientHeight);

                // Handle orientation change / resize
                window.addEventListener('resize', () => {
                    chart.resize(container.clientWidth, container.clientHeight);
                });

                console.log("Chart initialized");
            }, 0);
        });
    </script>
</body>
</html>
