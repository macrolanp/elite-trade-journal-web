<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Trade Journal</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #131722; color: #d1d4dc; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        .tv-card { background: #1e222d; border: 1px solid #363a45; border-radius: 8px; overflow: hidden; }
        /* 2. Set a rock-solid height for mobile */
        #chart-container { width: 100%; height: 350px; position: relative; }
    </style>
</head>
<body>
    <header class="mb-4 flex justify-between items-center">
        <h1 class="text-lg font-bold text-white">Elite Journal</h1>
        <span class="text-[10px] bg-green-900/30 text-green-400 border border-green-500/50 px-2 py-1 rounded-full">● BOT ACTIVE</span>
    </header>

    <div id="chart-container" class="tv-card shadow-2xl mb-6">
        <div id="tv-chart" style="width: 100%; height: 100%;"></div>
    </div>

    <div id="signals-list" class="space-y-4">
        <div class="tv-card p-4 border-l-4 border-l-blue-500">
            <div class="flex justify-between items-start mb-2">
                <span class="text-md font-bold text-white">GBP/USD</span>
                <span class="bg-blue-500/10 text-blue-400 text-[10px] px-2 py-1 rounded">AI 95%</span>
            </div>
            <div class="grid grid-cols-2 gap-2 text-xs mb-3">
                <div class="bg-[#2a2e39] p-2 rounded"><p class="text-gray-400">Entry</p><p class="text-white font-mono">1.26450</p></div>
                <div class="bg-[#2a2e39] p-2 rounded"><p class="text-gray-400">Target</p><p class="text-green-400 font-mono">1.27200</p></div>
            </div>
            <button class="w-full bg-[#2962ff] text-white py-3 rounded font-bold text-xs">EXECUTE ON MT5</button>
        </div>
    </div>

    <script>
        // 3. WAIT FOR THE PAGE TO LOAD FULLY BEFORE RUNNING
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('tv-chart');
            if (!container) return;

            // 4. Initialize Chart
            const chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: container.clientHeight,
                layout: { background: { color: '#1e222d' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#2b2e3a' }, horzLines: { color: '#2b2e3a' } },
                timeScale: { borderColor: '#363a45' }
            });

            const candleSeries = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
                wickUpColor: '#26a69a', wickDownColor: '#ef5350'
            });

            // 5. Hardcoded Data to test display
            candleSeries.setData([
                { time: '2026-03-01', open: 1.2500, high: 1.2580, low: 1.2450, close: 1.2530 },
                { time: '2026-03-02', open: 1.2530, high: 1.2650, low: 1.2520, close: 1.2610 },
                { time: '2026-03-03', open: 1.2610, high: 1.2700, low: 1.2580, close: 1.2645 },
                { time: '2026-03-04', open: 1.2645, high: 1.2680, low: 1.2620, close: 1.2660 }
            ]);

            // 6. Handle Mobile Screen Rotation
            window.addEventListener('resize', () => {
                chart.applyOptions({ 
                    width: container.clientWidth, 
                    height: container.clientHeight 
                });
            });
        });
    </script>
</body>
</html>
