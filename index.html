<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Journal | Institutional Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0B0E11; color: #d1d4dc; margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Sidebar Transitions */
        #sidebar { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
        .sidebar-closed { transform: translateX(-280px); }
        .sidebar-open { transform: translateX(0); }
        
        #sidebar-trigger {
            position: absolute; right: -24px; top: 50%; transform: translateY(-50%);
            width: 24px; height: 80px; background: #161B22; border: 1px solid #30363d;
            border-left: none; border-radius: 0 8px 8px 0; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* Custom scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        /* Chart Area height fix */
        #tv-widget-container { height: calc(100vh - 260px); width: 100%; position: relative; }
    </style>
</head>
<body class="flex h-screen">

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-[280px] bg-[#161B22] border-r border-[#30363d] sidebar-closed shadow-2xl flex flex-col">
        <div id="sidebar-trigger" onclick="toggleSidebar()"><div id="trigger-icon" class="text-gray-500 text-[10px] font-bold">▶</div></div>

        <div class="p-5 flex flex-col h-full gap-6">
            <header>
                <h1 class="text-lg font-bold text-white uppercase tracking-widest italic">Analytics</h1>
                <p class="text-[10px] text-gray-500 font-mono">SMC METRICS</p>
            </header>

            <div class="grid grid-cols-2 gap-2">
                <div class="p-3 bg-[#0D1117] border border-gray-800 rounded-lg text-center">
                    <p class="text-gray-500 text-[8px] uppercase font-bold">Win Rate</p>
                    <h3 class="text-lg font-bold text-green-400" id="stat-winrate">0%</h3>
                </div>
                <div class="p-3 bg-[#0D1117] border border-gray-800 rounded-lg text-center">
                    <p class="text-gray-500 text-[8px] uppercase font-bold">P. Factor</p>
                    <h3 class="text-lg font-bold text-white" id="stat-pf">0.00</h3>
                </div>
            </div>

            <div class="flex-1 flex flex-col min-h-0">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3">Trade History</p>
                <div id="trade-log" class="custom-scroll flex-1 overflow-y-auto space-y-2 pr-1 text-[10px]">
                    </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full">
        <header class="h-14 border-b border-[#30363d] flex items-center px-6 justify-between">
            <div class="flex items-center gap-4">
                <span class="text-white font-black tracking-tighter text-xl italic uppercase">Elite Journal</span>
                <span id="active-pair" class="text-sm font-mono text-gray-500 border-l border-gray-800 pl-4 uppercase">---</span>
            </div>
            <div id="active-confidence" class="bg-blue-900/20 text-blue-400 text-[9px] px-2 py-1 rounded border border-blue-800/40 font-bold uppercase tracking-tighter">Scanning Markets</div>
        </header>

        <div class="p-4 bg-[#0D1117] border-b border-[#30363d] flex flex-col gap-4 md:flex-row md:items-center">
            <div class="flex flex-1 gap-2">
                <div class="flex-1 bg-[#161B22] p-2 rounded border border-[#30363d] text-center">
                    <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">Entry Price</p>
                    <p id="entry-price" class="text-sm font-mono text-white font-bold">0.00000</p>
                </div>
                <div class="flex-1 bg-[#161B22] p-2 rounded border border-[#30363d] text-center">
                    <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">Take Profit</p>
                    <p id="target-price" class="text-sm font-mono text-green-400 font-bold">0.00000</p>
                </div>
            </div>
            <button onclick="alert('Executing on Linked MT5 Account...')" class="md:w-48 bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold py-3 rounded-lg uppercase tracking-widest transition-all active:scale-95 shadow-lg">
                Execute on MT5
            </button>
        </div>

        <div id="tv-widget-container">
            <div id="tv-widget" class="w-full h-full"></div>
        </div>

        <footer class="h-10 border-t border-[#30363d] bg-[#0B0E11] flex items-center px-4 overflow-hidden">
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2">
                    <span class="h-1.5 w-1.5 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">System:</span>
                </div>
                <div id="live-console" class="text-[9px] text-blue-400 font-mono italic">Initializing institutional scanner...</div>
            </div>
        </footer>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const SUPABASE_URL = 'https://sktishfzpeenrtkmihwg.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdGlzaGZ6cGVlbnJ0a21paHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Mjg2NzYsImV4cCI6MjA4ODIwNDY3Nn0.QwVi1PzWDJcti3IdQjrLL-bLipKT8CTJNNHqpWFXLr4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            const i = document.getElementById('trigger-icon');
            const open = s.classList.toggle('sidebar-open');
            s.classList.toggle('sidebar-closed', !open);
            i.innerText = open ? '◀' : '▶';
        }

        async function updateLiveLog(msg) {
            const consoleEl = document.getElementById('live-console');
            consoleEl.style.opacity = '0';
            setTimeout(() => {
                consoleEl.innerText = msg;
                consoleEl.style.opacity = '1';
            }, 200);
        }

        async function refreshData() {
            const { data: signals } = await _supabase.from('Signal').select('*').order('id', { ascending: false });
            if (!signals) return;

            // Update Stats
            const wins = signals.filter(s => s.status === 'WIN').length;
            const losses = signals.filter(s => s.status === 'LOSS').length;
            document.getElementById('stat-winrate').innerText = signals.length > 0 ? ((wins / (wins + losses || 1)) * 100).toFixed(0) + '%' : '0%';
            document.getElementById('stat-pf').innerText = losses > 0 ? (wins / losses).toFixed(2) : (wins > 0 ? '3.00+' : '0.00');

            // Update Trade Log
            document.getElementById('trade-log').innerHTML = signals.slice(0, 10).map(s => `
                <div class="p-2 bg-[#0D1117] border border-gray-800 rounded flex justify-between items-center">
                    <span>${s.pair.replace('FX:', '')}</span>
                    <span class="${s.status === 'WIN' ? 'text-green-400' : s.status === 'LOSS' ? 'text-red-400' : 'text-blue-400'} font-bold">${s.status}</span>
                </div>
            `).join('');

            // Update Main View
            const top = signals[0];
            if (top) {
                document.getElementById('active-pair').innerText = top.pair.replace('FX:', '').replace('OANDA:', '');
                document.getElementById('entry-price').innerText = top.entry;
                document.getElementById('target-price').innerText = top.target;
                document.getElementById('active-confidence').innerText = `AI ${top.confidence} MATCH`;
                updateLiveLog(`NEW SIGNAL DETECTED: ${top.pair} AT ${top.entry}`);
                
                new TradingView.widget({
                    "autosize": true,
                    "symbol": top.pair,
                    "interval": "15",
                    "theme": "dark",
                    "container_id": "tv-widget",
                    "style": "1"
                });
            }
        }

        _supabase.channel('public:Signal').on('postgres_changes', { event: '*', schema: 'public', table: 'Signal' }, refreshData).subscribe();
        
        // Simulation of scanner activity in the footer
        const statuses = ["Analyzing FVG on XAU/USD...", "Scanning M15 Liquidity...", "Syncing with Institutional Feed...", "Waiting for Market Structure Break..."];
        setInterval(() => {
            if (Math.random() > 0.7) updateLiveLog(statuses[Math.floor(Math.random() * statuses.length)]);
        }, 5000);

        refreshData();
    </script>
</body>
</html>
