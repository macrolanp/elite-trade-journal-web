<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Trade Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #131722; color: #d1d4dc; margin: 0; padding: 15px; font-family: sans-serif; }
        .card { background: #1e222d; border: 1px solid #363a45; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <header class="flex justify-between items-center mb-6 px-1">
        <h1 class="text-xl font-bold text-white uppercase tracking-tighter">Elite Journal</h1>
        <div class="flex items-center gap-2">
            <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>
            <span class="text-[10px] text-green-400 font-bold uppercase">Bot Active</span>
        </div>
    </header>

    <div class="card border-l-4 border-l-blue-600 shadow-2xl">
        <div class="flex justify-between items-center mb-4">
            <span class="text-lg font-bold text-white">GBP/USD</span>
            <span class="bg-blue-900/40 text-blue-400 text-[10px] px-2 py-1 rounded border border-blue-500/20 font-bold">AI 95% MATCH</span>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-5">
            <div class="bg-[#2a2e39] p-3 rounded-lg text-center">
                <p class="text-[9px] text-gray-400 uppercase font-bold mb-1">Entry</p>
                <p class="text-md font-mono text-white font-bold">1.26450</p>
            </div>
            <div class="bg-[#2a2e39] p-3 rounded-lg text-center">
                <p class="text-[9px] text-gray-400 uppercase font-bold mb-1">Target</p>
                <p class="text-md font-mono text-green-400 font-bold">1.27200</p>
            </div>
        </div>

        <button onclick="alert('Trade Signal: GBPUSD Buy at 1.26450. Opening MT5...')" 
                class="w-full bg-[#2962ff] active:bg-[#1e48f1] text-white py-4 rounded-xl font-bold text-sm shadow-lg transition-all active:scale-95 uppercase tracking-widest">
            Execute on MT5
        </button>
    </div>

    <div class="card" style="height: 450px; padding: 0; overflow: hidden;">
        <div id="tradingview_widget" style="height: 100%; width: 100%;"></div>
    </div>

    <p class="text-center text-[9px] text-gray-600 uppercase tracking-widest mb-4">
        Last Sync: Live Market Data
    </p>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "FX:GBPUSD",
            "interval": "H1",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "allow_symbol_change": true,
            "container_id": "tradingview_widget"
        });
    </script>
</body>
</html>
