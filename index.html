<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TERMINAL | Professional</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #010409; --panel: #0d1117; --border: #30363d; --accent: #58a6ff; --bull: #3fb950; --bear: #f85149; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; margin: 0; display: flex; flex-direction: column; }
        
        /* Sidebar Logic */
        #sidebar { 
            position: fixed; top: 0; right: 0; bottom: 0; width: 280px; 
            background: var(--panel); border-left: 1px solid var(--border); 
            transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; 
        }
        #sidebar.open { transform: translateX(0); box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 40; display: none; }
        .overlay.active { display: block; }

        /* UI Components */
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 2px; }
        .stat-card { padding: 12px; border-bottom: 1px solid var(--border); }
        .label { font-size: 7px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 14px; font-weight: bold; }
        .history-row { display: flex; justify-content: space-between; font-size: 9px; padding: 6px 0; border-bottom: 1px solid #21262d; }
        
        .fullscreen-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        input { background: var(--panel); border: 1px solid var(--border); padding: 12px; color: white; margin-bottom: 10px; width: 100%; outline: none; text-align: center; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar">
        <div class="p-4 border-b border-[#30363d] flex justify-between items-center">
            <span class="text-[10px] font-bold tracking-widest text-[#58a6ff]">PERFORMANCE HUB</span>
            <button onclick="toggleSidebar()" class="text-xs text-[#8b949e]">CLOSE [X]</button>
        </div>
        
        <div class="stat-card">
            <span class="label">Win Rate</span>
            <div class="flex items-end gap-2">
                <span id="win-rate" class="text-2xl font-bold text-[#3fb950]">0%</span>
                <span class="text-[8px] text-[#8b949e] mb-1">AGGREGATE</span>
            </div>
        </div>

        <div class="stat-card">
            <span class="label">Trade Count</span>
            <p id="trade-count" class="value">0 Total</p>
        </div>

        <div class="p-4">
            <span class="label mb-2 block">Recent History</span>
            <div id="history-list" class="flex flex-col">
                </div>
        </div>

        <div class="absolute bottom-4 left-4 right-4">
            <button onclick="factoryReset()" class="w-full py-2 text-[8px] border border-red-900/50 text-red-500/50 uppercase">Emergency Wipe</button>
        </div>
    </aside>

    <div id="setup-screen" class="fullscreen-overlay hidden px-10">
        <h2 class="text-xs text-[#58a6ff] mb-8 tracking-widest uppercase font-bold">Terminal Init</h2>
        <input id="setup-url" type="text" placeholder="SUPABASE URL">
        <input id="setup-key" type="password" placeholder="ANON KEY">
        <input id="setup-pin" type="password" placeholder="SET PIN">
        <button onclick="saveSetup()" class="w-full py-4 bg-[#238636] text-white text-[10px] font-bold uppercase">Activate Node</button>
    </div>

    <div id="lock-screen" class="fullscreen-overlay hidden">
        <h2 class="text-[8px] text-[#8b949e] tracking-[0.4em] mb-8 uppercase">Authorization</h2>
        <input id="pin-input" type="password" placeholder="••••" class="bg-transparent border-b border-[#30363d] !w-40 text-2xl mb-8">
        <button onclick="checkPin()" class="w-full max-w-[160px] border border-[#58a6ff] text-[#58a6ff] py-3 text-[10px] font-bold">ENTER</button>
    </div>

    <header class="h-12 border-b border-[#30363d] flex items-center justify-between px-4 bg-[#010409] z-10">
        <div class="flex flex-col">
            <span class="text-[10px] font-bold italic">ELITE<span class="text-[#58a6ff] not-italic">TERMINAL</span></span>
        </div>
        <button onclick="toggleSidebar()" class="border border-[#30363d] px-3 py-1 rounded text-[9px] font-bold hover:bg-[#30363d]">
            STATS ☰
        </button>
    </header>

    <main class="flex-1 flex flex-col p-1 gap-1">
        <div class="grid grid-cols-3 gap-1 shrink-0">
            <div class="panel p-2 text-center">
                <span class="label block mb-1">Entry</span>
                <span id="entry-price" class="text-xs font-bold text-[#d29922]">0.0000</span>
            </div>
            <div class="panel p-2 text-center">
                <span class="label block mb-1">Stop</span>
                <span id="stop-loss" class="text-xs font-bold text-[#f85149]">0.0000</span>
            </div>
            <div class="panel p-2 text-center">
                <span class="label block mb-1">Target</span>
                <span id="target-price" class="text-xs font-bold text-[#3fb950]">0.0000</span>
            </div>
        </div>

        <div class="panel h-20 overflow-hidden flex flex-col">
            <div class="text-[7px] text-[#8b949e] p-1 border-b border-[#30363d] flex justify-between">
                <span>SYSTEM LOG</span>
                <span id="active-pair" class="text-[#3fb950]">WAITING...</span>
            </div>
            <div id="log-content" class="p-2 text-[8px] text-[#58a6ff] overflow-y-auto flex-1">
                > System initialized. Handshake pending.
            </div>
        </div>

        <div class="panel flex-1 relative overflow-hidden">
            <div id="tv-widget" class="absolute inset-0"></div>
        </div>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const S_URL = localStorage.getItem('SUB_URL');
        const S_KEY = localStorage.getItem('SUB_KEY');
        const S_PWD = localStorage.getItem('SUB_PWD');

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function route() {
            if (!S_URL || !S_KEY || !S_PWD) document.getElementById('setup-screen').classList.remove('hidden');
            else document.getElementById('lock-screen').classList.remove('hidden');
        }

        function saveSetup() {
            localStorage.setItem('SUB_URL', document.getElementById('setup-url').value.trim());
            localStorage.setItem('SUB_KEY', document.getElementById('setup-key').value.trim());
            localStorage.setItem('SUB_PWD', document.getElementById('setup-pin').value.trim());
            location.reload();
        }

        function checkPin() {
            if(document.getElementById('pin-input').value === S_PWD) {
                document.getElementById('lock-screen').classList.add('hidden');
                initTerminal();
            } else alert("DENIED");
        }

        function factoryReset() { if(confirm("WIPE DATA?")) { localStorage.clear(); location.reload(); } }

        function addLog(msg) {
            const log = document.getElementById('log-content');
            log.innerHTML = `> ${msg}<br>` + log.innerHTML;
        }

        async function initTerminal() {
            const _supabase = supabase.createClient(S_URL, S_KEY);
            
            async function refresh() {
                // 1. PERFORMANCE TRACKER LOGIC
                const { data: all } = await _supabase.from('signals').select('*').order('id', { ascending: false });
                if (all) {
                    const wins = all.filter(s => s.status === 'TP').length;
                    const rate = all.length > 0 ? ((wins / all.length) * 100).toFixed(0) : 0;
                    document.getElementById('win-rate').innerText = `${rate}%`;
                    document.getElementById('trade-count').innerText = `${all.length} Total Trades`;
                    
                    // History Sidebar injection
                    const historyList = document.getElementById('history-list');
                    historyList.innerHTML = all.slice(0, 8).map(s => `
                        <div class="history-row">
                            <span class="text-white">${s.pair}</span>
                            <span class="${s.status === 'TP' ? 'text-[#3fb950]' : 'text-[#f85149]'}">${s.status || 'PENDING'}</span>
                        </div>
                    `).join('');
                }

                // 2. LATEST SIGNAL LOGIC
                const { data: latest } = await _supabase.from('signals').select('*').order('id', { ascending: false }).limit(1);
                if (latest && latest.length > 0) {
                    const s = latest[0];
                    document.getElementById('entry-price').innerText = s.entry;
                    document.getElementById('stop-loss').innerText = s.stop_loss || '0.0000';
                    document.getElementById('target-price').innerText = s.target;
                    document.getElementById('active-pair').innerText = s.pair;
                    addLog(`SYNC: ${s.pair} @ ${s.entry}`);

                    new TradingView.widget({
                        "autosize": true, "symbol": s.pair.includes(':') ? s.pair : `FX:${s.pair}`,
                        "interval": "15", "theme": "dark", "style": "1",
                        "container_id": "tv-widget", "backgroundColor": "#010409",
                        "hide_top_toolbar": true, "hide_side_toolbar": true
                    });
                }
            }

            _supabase.channel('db').on('postgres_changes', { event: '*', schema: 'public', table: 'signals' }, () => {
                addLog("SIGNAL INBOUND...");
                refresh();
            }).subscribe();
            refresh();
        }
        route();
    </script>
</body>
</html>
